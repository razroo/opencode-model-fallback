name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        # Catches dist/ drift before it can ship via `npm publish`.
        run: bun run build

      - name: Test
        run: bun run test

      - name: Verify dist/ built
        # Fails the job if build produced no dist/ (e.g. build.ts regression).
        # `files` in package.json ships only dist/ — shipping an empty one
        # would publish a broken package.
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
